version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: insightdisc_postgres
    restart: always
    ports:
      - "${INSIGHTDISC_POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: insightdisc
      POSTGRES_PASSWORD: insightdisc
      POSTGRES_DB: insightdisc
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
