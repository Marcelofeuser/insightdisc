name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-and-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      SERVER_PORT: 4000
      APP_URL: http://127.0.0.1:5173
      FRONTEND_URL: http://127.0.0.1:5173
      VITE_API_URL: http://127.0.0.1:4000
      E2E_API_URL: http://127.0.0.1:4000
      VITE_ENABLE_DEV_LOGIN_SHORTCUTS: "true"
      SUPER_ADMIN_MASTER_KEY: example_master_key
      SUPER_ADMIN_EMAIL: admin@insightdisc.app
      SUPER_ADMIN_PASSWORD: example_password
      SUPER_ADMIN_SEED_EMAIL: admin@insightdisc.app
      SUPER_ADMIN_SEED_PASSWORD: example_password
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: insightdisc_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d insightdisc_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm --prefix server ci

      - name: Prepare backend database
        run: |
          npm --prefix server run prisma:generate
          npm --prefix server run prisma:push
          npm --prefix server run seed:super-admin

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Start backend server
        run: npm --prefix server start &
      - name: Wait for backend
        run: npx wait-on http://127.0.0.1:4000/health --timeout 30000

      - name: Run E2E (core)
        run: npm run test:e2e
        env:
          CI: true
          PW_ENABLE_API_MODE: "false"

      - name: Run E2E (auth/api)
        run: npx playwright test tests/e2e/audit-api-authorization.spec.js tests/e2e/audit-auth-routes.spec.js tests/e2e/public-report.spec.js --workers=1
        env:
          CI: true
          PW_ENABLE_API_MODE: "true"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results
          if-no-files-found: ignore
          retention-days: 14
